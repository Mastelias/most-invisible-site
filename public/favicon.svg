<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 512 512">
  <image href="uploads/icon-dark.png" width="512" height="512" class="li"/>
  <image href="uploads/icon-light.png" width="512" height="512" class="di"/>
  <style>
    .di { display: none; }
    @media (prefers-color-scheme: dark) {
      .li { display: none; }
      .di { display: block; }
    }
  </style>
</svg>
